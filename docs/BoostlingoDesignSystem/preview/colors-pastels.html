<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:22px 24px;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;}
  .t{flex:1;height:60px;border-radius:14px;display:flex;align-items:flex-end;padding:8px 10px;font-size:11px;font-weight:700;color:var(--fg-1);border:1px solid rgba(20,22,27,.05);}
  .note{margin-top:13px;font-size:12px;color:var(--fg-2);line-height:1.45;}
</style></head>
<body class="bl"><div class="wrap">
  <div class="row">
    <div class="t" style="background:var(--pastel-sky)">sky</div>
    <div class="t" style="background:var(--pastel-lilac)">lilac</div>
    <div class="t" style="background:var(--pastel-coral)">coral</div>
    <div class="t" style="background:var(--pastel-mint)">mint</div>
    <div class="t" style="background:var(--pastel-peach)">peach</div>
    <div class="t" style="background:var(--pastel-gray)">gray</div>
  </div>
  <p class="note">Soft fills behind grouped stats &amp; category chips (per the aesthetic reference). Never as full-page backgrounds.</p>
</div></body></html>
