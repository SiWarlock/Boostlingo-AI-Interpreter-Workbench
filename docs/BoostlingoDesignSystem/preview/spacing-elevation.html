<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--canvas);}
  .wrap{padding:26px 24px;font-family:var(--font-sans);display:flex;gap:26px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:130px;height:64px;background:var(--surface);border:1px solid var(--border);border-radius:16px;}
  .cap{font-size:11.5px;font-weight:600;color:var(--fg-1);margin-top:13px;}
  .sub{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);}
</style></head>
<body class="bl"><div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--sh-xs)"></div><div class="cap">xs · hairline lift</div><div class="sub">chips, inputs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--sh-sm)"></div><div class="cap">sm · resting card</div><div class="sub">default panel</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--sh-md)"></div><div class="cap">md · raised</div><div class="sub">popover, overlay</div></div>
</div></body></html>
