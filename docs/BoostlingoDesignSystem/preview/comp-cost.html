<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:20px 24px;font-family:var(--font-sans);}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);}
  .row{display:flex;align-items:baseline;gap:8px;margin-top:10px;}
  .big{font-family:var(--font-mono);font-size:34px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--fg-1);line-height:1;}
  .per{font-size:14px;color:var(--fg-3);}
  .est{font-size:12px;color:var(--fg-2);background:var(--surface-sunken);padding:3px 8px;border-radius:6px;align-self:center;}
  .meta{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
  .ln{display:flex;justify-content:space-between;font-size:12.5px;}
  .ln .k{color:var(--fg-2);}
  .ln .v{font-family:var(--font-mono);color:var(--fg-1);}
  .assume{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:11.5px;color:var(--fg-3);border-bottom:1px dashed var(--border-strong);padding-bottom:1px;}
</style></head>
<body class="bl"><div class="wrap">
  <div class="eyebrow">Cost</div>
  <div class="row">
    <span class="est">Estimated</span>
    <div class="big">$0.18</div><span class="per">/ min</span>
  </div>
  <div class="meta">
    <div class="ln"><span class="k">Model</span><span class="v">gpt-realtime-mini</span></div>
    <div class="ln"><span class="k">This turn</span><span class="v">$0.011</span></div>
    <div class="ln"><span class="k">Output pricing</span><span class="v" style="color:var(--metric-na)">n/a</span></div>
  </div>
  <span class="assume">ⓘ assumes input-priced audio</span>
</div></body></html>
