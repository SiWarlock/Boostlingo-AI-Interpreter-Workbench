<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:18px 22px;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .col .hd{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:9px;}
  .flag{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:5px;background:var(--surface-sunken);color:var(--fg-2);}
  .line{font-size:14px;line-height:1.5;color:var(--fg-1);}
  .partial{color:var(--fg-3);font-style:italic;}
  .cursor{display:inline-block;width:2px;height:15px;background:var(--bl-blue);vertical-align:-2px;animation:bl .9s steps(2) infinite;margin-left:1px;}
  @keyframes bl{50%{opacity:0}}
</style></head>
<body class="bl"><div class="wrap">
  <div class="col">
    <div class="hd">Source <span class="flag">EN</span></div>
    <div class="line">Where does it hurt the most?</div>
    <div class="line partial">and how long has it&nbsp;<span class="cursor"></span></div>
  </div>
  <div class="col">
    <div class="hd">Target <span class="flag">ES</span></div>
    <div class="line">¿Dónde le duele más?</div>
    <div class="line partial">y cuánto tiempo&nbsp;<span class="cursor" style="background:var(--bl-violet)"></span></div>
  </div>
</div></body></html>
