<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}

<body class="bl"><div class="wrap">
  <span class="spec">Display · Plus Jakarta Sans 800 · 40/1.05 · -1%</span>
  <div class="d">1.24 s speech → audio</div>
  <span class="spec" style="margin-top:14px">H1 · 700 · 28px · app title</span>
  <div class="h1">AI Interpreter Workbench</div>
  <span class="spec" style="margin-top:14px">H2 · 700 · 20px · region title</span>
