<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:22px 24px;font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;font-family:var(--font-mono);}
  .dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
  .rec{background:var(--st-recording-bg);color:var(--st-recording-fg);}
  .rec .dot{animation:pulse 1.1s var(--ease) infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(197,55,27,.5)}70%{box-shadow:0 0 0 7px rgba(197,55,27,0)}100%{box-shadow:0 0 0 0 rgba(197,55,27,0)}}
  .proc{background:var(--st-processing-bg);color:var(--st-processing-fg);}
  .spin{width:11px;height:11px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .play{background:var(--st-playing-bg);color:var(--st-playing-fg);}
  .bars{display:inline-flex;gap:2px;align-items:flex-end;height:11px;}
  .bars i{width:2px;background:currentColor;border-radius:1px;animation:eq .9s var(--ease) infinite;}
  .bars i:nth-child(1){height:5px;animation-delay:0s}.bars i:nth-child(2){height:11px;animation-delay:.15s}.bars i:nth-child(3){height:7px;animation-delay:.3s}.bars i:nth-child(4){height:9px;animation-delay:.45s}
  @keyframes eq{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
  .done{background:var(--st-completed-bg);color:var(--st-completed-fg);}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style></head>
<body class="bl"><div class="wrap">
  <div class="row">
    <span class="pill rec"><span class="dot"></span>REC</span>
    <span class="pill proc"><span class="spin"></span>processing</span>
    <span class="pill play"><span class="bars"><i></i><i></i><i></i><i></i></span>playing</span>
    <span class="pill done"><span class="dot"></span>completed</span>
  </div>
  <span class="cap">live turn indicators — pulse / spinner / equalizer / solid</span>
</div></body></html>
