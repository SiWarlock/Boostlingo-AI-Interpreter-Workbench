<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--canvas);}
  .wrap{padding:24px;font-family:var(--font-sans);display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 22px;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:14px;}
  .dark{background:var(--ink);}
  .dark img{filter:none;}
  .wm{height:30px;}
  .mk{height:54px;}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style></head>
<body class="bl"><div class="wrap">
  <div class="card"><img class="wm" src="../assets/lockup.svg" alt="lockup"></div>
  <div class="card"><img class="mk" src="../assets/mark.svg" alt="mark"></div>
  <span class="note">placeholder recreations — replace with official assets</span>
</div></body></html>
