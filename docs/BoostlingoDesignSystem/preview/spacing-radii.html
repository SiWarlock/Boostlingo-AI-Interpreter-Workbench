<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--canvas);}
  .wrap{padding:22px 24px;font-family:var(--font-sans);display:flex;gap:16px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:84px;height:62px;background:var(--surface);border:1px solid var(--border);}
  .cap{font-size:11.5px;font-weight:600;color:var(--fg-1);margin-top:8px;}
  .sub{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style></head>
<body class="bl"><div class="wrap">
  <div class="item"><div class="box" style="border-radius:var(--r-chip)"></div><div class="cap">chip</div><div class="sub">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-control)"></div><div class="cap">control</div><div class="sub">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-panel)"></div><div class="cap">panel</div><div class="sub">16px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-card)"></div><div class="cap">card</div><div class="sub">24px</div></div>
  <div class="item"><div class="box" style="border-radius:999px;width:62px"></div><div class="cap">pill</div><div class="sub">999px</div></div>
</div></body></html>
