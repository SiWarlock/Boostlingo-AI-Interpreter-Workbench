<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:20px 24px;font-family:var(--font-sans);}
  .top{display:flex;align-items:baseline;gap:10px;}
  .big{font-family:var(--font-mono);font-size:38px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--fg-1);line-height:1;}
  .unit{font-size:15px;color:var(--fg-3);}
  .tgt{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--success);background:var(--success-tint);padding:4px 9px;border-radius:999px;font-weight:600;}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:9px;}
  .bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-top:16px;background:var(--surface-sunken);}
  .seg{height:100%;}
  .legend{display:flex;gap:16px;margin-top:10px;}
  .lg{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
  .lg .k{width:9px;height:9px;border-radius:3px;}
</style></head>
<body class="bl"><div class="wrap">
  <div class="eyebrow">This turn · speech → first audio</div>
  <div class="top">
    <div class="big">0.84<span class="unit"> s</span></div>
    <span class="tgt">▾ under 1.5s target</span>
  </div>
  <div class="bar">
    <div class="seg" style="width:34%;background:var(--bl-blue)"></div>
    <div class="seg" style="width:40%;background:var(--bl-violet)"></div>
    <div class="seg" style="width:26%;background:var(--bl-coral)"></div>
  </div>
  <div class="legend">
    <span class="lg"><span class="k" style="background:var(--bl-blue)"></span>STT 286ms</span>
    <span class="lg"><span class="k" style="background:var(--bl-violet)"></span>Trans 337ms</span>
    <span class="lg"><span class="k" style="background:var(--bl-coral)"></span>TTS 217ms</span>
  </div>
</div></body></html>
