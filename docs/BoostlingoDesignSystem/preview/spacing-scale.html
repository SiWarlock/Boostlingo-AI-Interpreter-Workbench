<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);}
  .wrap{padding:22px 24px;font-family:var(--font-sans);}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .item{text-align:center;}
  .box{background:var(--bl-blue-tint);border:1px solid var(--border);}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:7px;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px;}
</style></head>
<body class="bl"><div class="wrap">
  <p class="lbl">Spacing scale · 4px base</p>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:30px"></div><div class="cap">4</div></div>
    <div class="item"><div class="box" style="width:8px;height:30px"></div><div class="cap">8</div></div>
    <div class="item"><div class="box" style="width:12px;height:30px"></div><div class="cap">12</div></div>
    <div class="item"><div class="box" style="width:16px;height:30px"></div><div class="cap">16</div></div>
    <div class="item"><div class="box" style="width:20px;height:30px"></div><div class="cap">20</div></div>
    <div class="item"><div class="box" style="width:24px;height:30px"></div><div class="cap">24</div></div>
    <div class="item"><div class="box" style="width:32px;height:30px"></div><div class="cap">32</div></div>
    <div class="item"><div class="box" style="width:40px;height:30px"></div><div class="cap">40</div></div>
    <div class="item"><div class="box" style="width:48px;height:30px"></div><div class="cap">48</div></div>
  </div>
</div></body></html>
